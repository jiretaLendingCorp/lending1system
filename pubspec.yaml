name: lending1system
description: Jireta Loans & Credit Corp. 1996 — Enterprise Lending Management System
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Supabase
  supabase_flutter: ^2.5.3

  # Firebase / FCM
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.1

  # HTTP
  dio: ^5.4.3
  http: ^1.2.1

  # UI & Design
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2

  # Charts & Analytics
  fl_chart: ^0.68.0
  syncfusion_flutter_charts: ^26.2.12

  # Data Tables
  data_table_2: ^2.5.12
  pluto_grid: ^8.1.0

  # Maps & GPS
  google_maps_flutter: ^2.7.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Image & File Handling
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  photo_view: ^0.15.0
  flutter_image_compress: ^2.3.0

  # PDF Generation
  pdf: ^3.11.0
  printing: ^5.13.1
  open_filex: ^4.5.0

  # Storage & Local Data
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0

  # Forms & Validation
  reactive_forms: ^17.0.1
  form_validator: ^2.1.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.2
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  connectivity_plus: ^6.0.4
  package_info_plus: ^8.0.2
  device_info_plus: ^10.1.2
  path_provider: ^2.1.3
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  permission_handler: ^11.3.1
  local_auth: ^2.3.0
  crypto: ^3.0.3

  # Excel Export
  excel: ^4.0.2

  # Signature
  syncfusion_flutter_signaturepad: ^26.2.12

  # Animations
  animations: ^2.0.11
  page_transition: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/lottie/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: PoppinsLight
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300